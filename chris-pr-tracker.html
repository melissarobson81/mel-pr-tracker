<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Chris' PR Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg: #faf9f5;
    --surface: #ffffff;
    --surface-raised: #ffffff;
    --line: #e3e0d5;
    --ink: #211f1b;
    --ink-dim: #6f6a5d;
    --ink-faint: #a39d8c;
    --rust: #c15630;
    --rust-bright: #a8451f;
    --danger: #b3261e;

    --plate-25: #d64545;
    --plate-20: #2f6fed;
    --plate-15: #e8b93e;
    --plate-10: #3f9142;
    --plate-5:  #f2efe6;
    --plate-2_5:#2a2825;

    --disp: 'Anton', sans-serif;
    --body: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;

    --radius: 14px;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    padding-bottom: 100px;
  }

  /* subtle concrete texture */
  body::before{
    content:"";
    position: fixed; inset:0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(33,31,27,0.02), transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(33,31,27,0.015), transparent 45%);
    pointer-events:none;
    z-index: 0;
  }

  .wrap{ max-width: 560px; margin: 0 auto; padding: 28px 18px 0; position: relative; z-index:1; }

  header{ margin-bottom: 22px; }
  .eyebrow{
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--rust);
    margin: 0;
  }
  h1{
    font-family: var(--disp);
    font-weight: 400;
    font-size: 44px;
    letter-spacing: 0.01em;
    margin: 0;
    line-height: 0.95;
    text-transform: uppercase;
  }
  .subhead{
    color: var(--ink-dim);
    font-size: 13px;
    margin: 8px 0 0;
    line-height: 1.5;
  }

  .backup-bar{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
  }
  .backup-status{
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-dim);
    margin: 0;
  }
  .backup-status.stale{ color: var(--danger); }
  .backup-actions{ display:flex; gap: 8px; flex-shrink: 0; }
  .btn-mini{
    font-family: var(--body);
    font-weight: 600;
    font-size: 12.5px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    border-radius: 999px;
    padding: 7px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-mini:active{ border-color: var(--ink-faint); color: var(--ink); }
  .btn-mini:focus-visible{ outline: 2px solid var(--rust-bright); outline-offset: 2px; }

  .group{ margin-top: 30px; }
  .group-label{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 12px;
    width: 100%;
    background: none;
    border: none;
    padding: 4px 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .group-label:focus-visible{ outline: 2px solid var(--rust-bright); outline-offset: 2px; }
  .group-label::after{
    content:"";
    flex:1;
    height:1px;
    background: var(--line);
  }
  .group-chevron{
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    transition: transform 0.18s ease;
    color: var(--ink-faint);
  }
  .group.collapsed .group-chevron{ transform: rotate(-90deg); }
  .group-body{
    display: block;
  }
  .group.collapsed .group-body{
    display: none;
  }

  .card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 16px 14px;
    margin-bottom: 10px;
    box-shadow: 0 1px 3px rgba(33,31,27,0.05), 0 6px 16px rgba(33,31,27,0.04);
    transition: border-color 0.15s ease;
  }
  .card:active{ border-color: var(--ink-faint); }

  .card-top{
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .lift-name{
    font-family: var(--disp);
    font-weight: 400;
    font-size: 21px;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    margin: 0 0 2px;
  }
  .lift-meta{
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-dim);
    display:flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .lift-meta .tag{
    color: var(--ink-faint);
  }

  .max-block{ text-align: right; flex-shrink:0; }
  .max-num{
    font-family: var(--disp);
    font-size: 30px;
    line-height: 1;
    color: var(--ink);
  }
  .max-num span{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-dim);
    margin-left: 3px;
  }
  .max-empty{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-faint);
    padding-top: 6px;
  }

  /* barbell plate visualization */
  .bar-row{
    margin: 16px 0 12px;
  }
  .bar-row svg{
    width: 100%;
    height: auto;
    display: block;
  }

  .card-actions{
    display:flex;
    gap: 8px;
    margin-top: 4px;
  }
  .btn{
    font-family: var(--body);
    font-weight: 600;
    font-size: 13px;
    border: none;
    border-radius: 9px;
    padding: 10px 14px;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:focus-visible{ outline: 2px solid var(--rust-bright); outline-offset: 2px; }
  .btn-add{
    background: var(--rust);
    color: #fff;
    flex: 1;
  }
  .btn-add:active{ background: var(--rust-bright); }
  .btn-hist{
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--line);
  }
  .btn-hist:active{ border-color: var(--ink-faint); color: var(--ink); }
  .btn-pct{
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--line);
  }
  .btn-pct:active{ border-color: var(--ink-faint); color: var(--ink); }

  .pct-panel{
    display:none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .pct-panel.open{ display:block; }
  .pct-row{
    display:flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 9px 2px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .pct-row:last-of-type{ border-bottom: none; }
  .pct-row .pct-label{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-dim);
  }
  .pct-row.is-max .pct-label{ color: var(--rust); font-weight: 700; }
  .pct-row .pct-weight{
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
  }
  .pct-row.is-max .pct-weight{ color: var(--rust); }
  .pct-bar-wrap{
    display:none;
    padding: 10px 0 14px;
  }
  .pct-bar-wrap.open{ display:block; }
  .pct-bar-wrap .pct-bar-label{
    font-family: var(--disp);
    font-size: 22px;
    text-transform: uppercase;
    margin: 0 0 4px;
  }
  .pct-bar-wrap svg{
    width: 60%;
    max-width: 220px;
    height: auto;
    display: block;
  }

  .history{
    display:none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .history.open{ display:block; }
  .hist-row{
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--line);
  }
  .hist-row:last-child{ border-bottom: none; }
  .hist-left{ min-width:0; flex: 1; }
  .hist-date{ font-family: var(--mono); color: var(--ink-dim); font-size: 11.5px; }
  .hist-rep{ color: var(--ink); }
  .hist-note{ color: var(--ink-faint); font-size: 12px; font-style: italic; }
  .hist-right{
    display:flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  .hist-weight{
    font-family: var(--mono);
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
  }
  .hist-actions{ display:flex; gap: 10px; }
  .hist-action{
    font-family: var(--body);
    font-size: 11.5px;
    font-weight: 600;
    background: none;
    border: none;
    padding: 2px 0;
    cursor: pointer;
    color: var(--ink-faint);
    -webkit-tap-highlight-color: transparent;
  }
  .hist-action:active{ color: var(--ink); }
  .hist-action.delete:active{ color: var(--danger); }

  /* FAB */
  .fab{
    position: fixed;
    right: 20px;
    bottom: 24px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--rust);
    color: #fff;
    border: none;
    font-size: 28px;
    line-height: 1;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    cursor: pointer;
    z-index: 20;
    -webkit-tap-highlight-color: transparent;
  }
  .fab:active{ background: var(--rust-bright); transform: scale(0.96); }
  .fab:focus-visible{ outline: 2px solid var(--ink); outline-offset: 3px; }

  /* modal */
  .modal-backdrop{
    position: fixed; inset:0;
    background: rgba(0,0,0,0.55);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index: 50;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    background: var(--surface-raised);
    border-top: 1px solid var(--line);
    border-radius: 18px 18px 0 0;
    width: 100%;
    max-width: 560px;
    padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
    max-height: 88vh;
    overflow-y: auto;
  }
  .modal h2{
    font-family: var(--disp);
    font-weight: 400;
    text-transform: uppercase;
    font-size: 24px;
    margin: 0 0 16px;
  }
  .field{ margin-bottom: 14px; }
  .field label{
    display:block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .field select, .field input, .field textarea{
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 9px;
    padding: 12px 12px;
    font-family: var(--body);
    font-size: 15px;
  }
  .field input[type="number"]{ font-family: var(--mono); font-size: 20px; font-weight:600; }
  .field select:focus, .field input:focus, .field textarea:focus{
    outline: 2px solid var(--rust-bright); outline-offset: 1px;
  }
  .field textarea{ resize: vertical; min-height: 44px; font-size: 14px; }

  .rep-presets{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .rep-chip{
    font-family: var(--mono);
    font-size: 12.5px;
    padding: 7px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink-dim);
    cursor:pointer;
  }
  .rep-chip.active{ background: var(--rust); border-color: var(--rust); color:#fff; }

  .modal-actions{ display:flex; gap:10px; margin-top: 18px; }
  .btn-cancel{
    background: transparent; border: 1px solid var(--line); color: var(--ink-dim);
    flex:1; padding: 13px;
  }
  .btn-save{
    background: var(--rust); color:#fff; flex:2; padding: 13px; font-size:14.5px;
  }

  .toast{
    position: fixed;
    left: 50%; bottom: 96px;
    transform: translateX(-50%) translateY(10px);
    background: var(--ink);
    color: var(--bg);
    font-family: var(--mono);
    font-size: 12.5px;
    padding: 10px 16px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 60;
    pointer-events:none;
    white-space: nowrap;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <p class="eyebrow">Chris' PR Tracker</p>
    <p class="subhead">Your current max per lift, for percentage work. Tap a lift to see history, or hit + to log a new PR.</p>
    <div class="backup-bar">
      <p class="backup-status" id="backupStatus">Loading backup status…</p>
      <div class="backup-actions">
        <button type="button" class="btn-mini" id="exportBtn">Export</button>
        <button type="button" class="btn-mini" id="importBtn">Import</button>
        <input type="file" id="importFile" accept="application/json" style="display:none">
      </div>
    </div>
    <div class="backup-bar">
      <p class="backup-status" id="driveStatus">Google Drive: not connected</p>
      <div class="backup-actions">
        <button type="button" class="btn-mini" id="driveSaveBtn">Save to Drive</button>
        <button type="button" class="btn-mini" id="driveLoadBtn">Load from Drive</button>
      </div>
    </div>
  </header>
  <div id="groups"></div>
</div>

<button class="fab" id="fabAdd" aria-label="Log a new PR">+</button>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2 id="modalTitle">New PR</h2>
    <form id="prForm">
      <div class="field">
        <label for="liftSelect">Lift</label>
        <select id="liftSelect" required></select>
      </div>
      <div class="field">
        <label for="weightInput">Weight (kg)</label>
        <input type="number" id="weightInput" inputmode="decimal" step="0.5" min="0" placeholder="e.g. 65" required>
      </div>
      <div class="field">
        <label>Rep range</label>
        <div class="rep-presets" id="repPresets">
          <button type="button" class="rep-chip" data-val="1RM">1RM</button>
          <button type="button" class="rep-chip" data-val="3RM">3RM</button>
          <button type="button" class="rep-chip" data-val="5RM">5RM</button>
          <button type="button" class="rep-chip" data-val="custom">Custom</button>
        </div>
        <input type="text" id="repInput" placeholder="e.g. 1RM, 3 x 3 @80%">
      </div>
      <div class="field">
        <label for="dateInput">Date</label>
        <input type="date" id="dateInput" required>
      </div>
      <div class="field">
        <label for="noteInput">Note (optional)</label>
        <textarea id="noteInput" placeholder="How it felt, cues, conditions..."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-save" id="saveBtn">Save PR</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- data ---------- */
const GROUPS = [
  { label: "Squats", lifts: ["Backsquat", "Front Squat", "Overhead Squat"] },
  { label: "Olympic Lifts", lifts: ["Snatch", "Hang Snatch", "Clean", "Hang Clean", "Clean & Jerk"] },
  { label: "Press", lifts: ["Strict Press", "Push Press", "Jerk", "Push Jerk"] },
  { label: "Pull", lifts: ["Deadlift"] },
];

const DEFAULT_DATA = {};

const STORAGE_KEY = "pr-tracker:chris:store";
let DATA = null;
let META = { lastBackup: null };
const STALE_MS = 14 * 24 * 60 * 60 * 1000; // 2 weeks

/* ---------- storage ----------
   Uses the browser's own localStorage, so this works when the file is
   opened directly (e.g. downloaded and opened in Chrome), not just
   inside Claude's artifact viewer. Data is saved on this device, in
   this browser — use Export/Import to move it between devices. */
function makeEntryId(){
  return 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function ensureEntryIds(data){
  let changed = false;
  for(const lift of Object.keys(data)){
    for(const entry of data[lift]){
      if(!entry.id){
        entry.id = makeEntryId();
        changed = true;
      }
    }
  }
  return changed;
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      DATA = parsed.lifts || {};
      META = parsed.meta || { lastBackup: null };
      if(ensureEntryIds(DATA)) persist();
      return;
    }
  }catch(e){
    console.error("Couldn't read local storage", e);
  }
  DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  META = { lastBackup: null };
  ensureEntryIds(DATA);
  persist();
}

function persist(){
  try{
    const payload = JSON.stringify({ lifts: DATA, meta: META });
    localStorage.setItem(STORAGE_KEY, payload);
    return true;
  }catch(e){
    console.error("Couldn't save to local storage", e);
    showToast("Couldn't save — try again");
    return false;
  }
}

function formatBackupDate(iso){
  const d = new Date(iso);
  const day = d.getDate();
  const month = d.toLocaleDateString("en-GB", { month: "short" });
  const year = d.getFullYear();
  const hh = d.getHours();
  const mm = String(d.getMinutes()).padStart(2, "0");
  return `${day} ${month} ${year} at ${hh}:${mm}`;
}

function renderBackupStatus(){
  const el = document.getElementById("backupStatus");
  if(!el) return;
  if(!META.lastBackup){
    el.textContent = "Never backed up — tap Export to save a copy";
    el.classList.add("stale");
    return;
  }
  const stale = (Date.now() - new Date(META.lastBackup).getTime()) > STALE_MS;
  el.textContent = `Last backed up: ${formatBackupDate(META.lastBackup)}`;
  el.classList.toggle("stale", stale);
}

function renderDriveStatus(){
  const el = document.getElementById("driveStatus");
  if(!el) return;
  if(!META.lastDriveSync){
    el.textContent = "Google Drive: never synced";
    el.classList.remove("stale");
    return;
  }
  const stale = (Date.now() - new Date(META.lastDriveSync).getTime()) > STALE_MS;
  el.textContent = `Google Drive — last synced: ${formatBackupDate(META.lastDriveSync)}`;
  el.classList.toggle("stale", stale);
}

/* ---------- Google Drive sync ----------
   Uses Google Identity Services (OAuth) + the Drive REST API directly,
   storing one JSON file in the app's private "appDataFolder" (not
   visible in the person's regular Drive, only readable by this app).

   IMPORTANT — before this works you need to:
   1. Create a Google Cloud project + OAuth Client ID (Web application)
   2. Add your GitHub Pages URL as an Authorized JavaScript origin
   3. Paste that Client ID into GOOGLE_CLIENT_ID below
   See the setup guide provided alongside this file. */
const GOOGLE_CLIENT_ID = "PASTE_YOUR_CLIENT_ID_HERE.apps.googleusercontent.com";
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.appdata";
const DRIVE_FILE_NAME = "chris-pr-tracker.json";

let driveTokenClient = null;
let driveAccessToken = null;

function driveConfigured(){
  return GOOGLE_CLIENT_ID && !GOOGLE_CLIENT_ID.startsWith("PASTE_YOUR");
}

function ensureDriveTokenClient(){
  if(driveTokenClient) return driveTokenClient;
  if(typeof google === "undefined" || !google.accounts || !google.accounts.oauth2){
    throw new Error("Google sign-in script hasn't loaded yet — check your connection and try again.");
  }
  driveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: () => {} // replaced per-request in requestDriveToken()
  });
  return driveTokenClient;
}

function requestDriveToken(){
  return new Promise((resolve, reject) => {
    try{
      const client = ensureDriveTokenClient();
      client.callback = (resp) => {
        if(resp.error){ reject(new Error(resp.error)); return; }
        driveAccessToken = resp.access_token;
        resolve(resp.access_token);
      };
      client.requestAccessToken({ prompt: driveAccessToken ? "" : "consent" });
    }catch(err){ reject(err); }
  });
}

async function findDriveFile(token){
  const url = "https://www.googleapis.com/drive/v3/files"
    + "?spaces=appDataFolder"
    + "&q=" + encodeURIComponent(`name='${DRIVE_FILE_NAME}'`)
    + "&fields=files(id,name,modifiedTime)";
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if(!res.ok) throw new Error("Couldn't search Google Drive (status " + res.status + ")");
  const data = await res.json();
  return (data.files && data.files[0]) || null;
}

async function saveToDrive(){
  if(!driveConfigured()){
    showToast("Google Drive isn't set up yet — see the setup guide");
    return;
  }
  try{
    showToast("Connecting to Google Drive…");
    const token = await requestDriveToken();
    const existing = await findDriveFile(token);
    const payload = JSON.stringify({ lifts: DATA, meta: META }, null, 2);
    const metadata = existing
      ? { name: DRIVE_FILE_NAME, mimeType: "application/json" }
      : { name: DRIVE_FILE_NAME, mimeType: "application/json", parents: ["appDataFolder"] };
    const boundary = "pbtracker-" + Date.now();
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n` +
      `--${boundary}--`;
    const url = existing
      ? `https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const res = await fetch(url, {
      method: existing ? "PATCH" : "POST",
      headers: {
        Authorization: `Bearer ${token}`,
        "Content-Type": `multipart/related; boundary=${boundary}`
      },
      body
    });
    if(!res.ok) throw new Error("Drive save failed (status " + res.status + ")");

    META.lastDriveSync = new Date().toISOString();
    persist();
    renderDriveStatus();
    showToast("Saved to Google Drive");
  }catch(err){
    console.error(err);
    showToast("Couldn't save to Drive — try again");
  }
}

async function loadFromDrive(){
  if(!driveConfigured()){
    showToast("Google Drive isn't set up yet — see the setup guide");
    return;
  }
  try{
    showToast("Connecting to Google Drive…");
    const token = await requestDriveToken();
    const existing = await findDriveFile(token);
    if(!existing){
      showToast("No backup found on Drive yet — try Save to Drive first");
      return;
    }
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${existing.id}?alt=media`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if(!res.ok) throw new Error("Drive load failed (status " + res.status + ")");
    const parsed = await res.json();
    const lifts = (parsed && typeof parsed === "object" && parsed.lifts) ? parsed.lifts : parsed;
    if(!lifts || typeof lifts !== "object" || Array.isArray(lifts)){
      throw new Error("Unrecognized file format");
    }
    const proceed = window.confirm("Loading from Drive will replace the PR data currently on this device. Continue?");
    if(!proceed) return;

    DATA = lifts;
    if(parsed.meta) META = { ...META, ...parsed.meta };
    ensureEntryIds(DATA);
    persist();
    render();
    renderDriveStatus();
    showToast("Loaded from Google Drive");
  }catch(err){
    console.error(err);
    showToast("Couldn't load from Drive — try again");
  }
}

/* ---------- helpers ---------- */
function maxWeightIn(str){
  const nums = String(str).split(",").map(s => parseFloat(s)).filter(n => !isNaN(n));
  return nums.length ? Math.max(...nums) : 0;
}

function getCurrent(liftName){
  const hist = DATA[liftName] || [];
  if(hist.length === 0) return null;
  const oneRMs = hist.filter(e => e.rep.toLowerCase().includes("1rm"));
  const pool = oneRMs.length ? oneRMs : hist;
  let best = pool[0];
  let bestVal = maxWeightIn(best.weight);
  for(const e of pool){
    const v = maxWeightIn(e.weight);
    if(v > bestVal || (v === bestVal && e.date > best.date)){
      best = e; bestVal = v;
    }
  }
  return { entry: best, value: bestVal, isPR: oneRMs.length > 0 };
}

function sortedHistory(liftName){
  return [...(DATA[liftName] || [])].sort((a,b) => b.date.localeCompare(a.date));
}

function formatDate(iso){
  const d = new Date(iso + "T00:00:00");
  if(isNaN(d)) return iso;
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}

/* plate math: this bar = 15kg, plates in kg.
   Plates are sized to fit a printed weight label, like a real gym plate. */
const PLATE_DEFS = [
  { kg: 25,  color: "var(--plate-25)",  w: 13, h: 58, text: "#fff" },
  { kg: 20,  color: "var(--plate-20)",  w: 12, h: 55, text: "#fff" },
  { kg: 15,  color: "var(--plate-15)",  w: 11, h: 52, text: "var(--ink)" },
  { kg: 10,  color: "var(--plate-10)",  w: 10, h: 48, text: "#fff" },
  { kg: 5,   color: "var(--plate-5)",   w: 9,  h: 42, text: "var(--ink)" },
  { kg: 2.5, color: "var(--plate-2_5)", w: 8,  h: 34, text: "#fff" },
  { kg: 2,   color: "var(--plate-20)",  w: 7,  h: 30, text: "#fff" },
  { kg: 1.5, color: "var(--plate-15)",  w: 7,  h: 27, text: "var(--ink)" },
  { kg: 1.25,color: "var(--plate-2_5)", w: 6.7,h: 25, text: "#fff" },
  { kg: 1,   color: "var(--plate-10)",  w: 6.5,h: 24, text: "#fff" },
  { kg: 0.5, color: "var(--plate-5)",   w: 6,  h: 20, text: "var(--ink)" },
];
function platesForSide(totalKg){
  let remaining = Math.max(0, (totalKg - 15) / 2);
  const plates = [];
  for(const p of PLATE_DEFS){
    while(remaining + 1e-6 >= p.kg){
      plates.push(p);
      remaining -= p.kg;
    }
  }
  return plates; // heaviest first (loaded nearest the collar)
}

function plateLabelLines(kg){
  const str = String(kg);
  if(str.includes(".")){
    const [whole, dec] = str.split(".");
    return [whole + ".", dec];
  }
  return [str];
}

function renderBar(weightKg, uid){
  const plates = platesForSide(weightKg);
  const VB_W = 320, VB_H = 90, CY = 45;
  const HALF_BAR = 74;        // visible bar length each side of center
  const COLLAR_GAP = 3;       // gap between collar and first plate
  const SLEEVE_STUB = 10;     // bit of bar visible past the last plate
  const CENTER = VB_W / 2;

  // stack outward from the collar, heaviest plate innermost
  function stackRects(direction){ // direction: -1 = left, +1 = right
    let cursor = CENTER + direction * (HALF_BAR + COLLAR_GAP);
    const rects = [];
    for(const p of plates){
      const x = direction === -1 ? cursor - p.w : cursor;
      const cx = x + p.w / 2;
      rects.push(`<rect x="${x.toFixed(1)}" y="${(CY - p.h/2).toFixed(1)}" width="${p.w}" height="${p.h}" rx="1.5" fill="${p.color}" stroke="rgba(33,31,27,0.35)" stroke-width="1"/>`);

      const lines = plateLabelLines(p.kg);
      const fontSize = p.w >= 11 ? 8.5 : 7;
      const lineGap = fontSize + 0.5;
      const startDy = lines.length > 1 ? -(lineGap / 2) : 0;
      const tspans = lines.map((line, i) =>
        `<tspan x="${cx.toFixed(1)}" dy="${i === 0 ? startDy.toFixed(1) : lineGap}">${line}</tspan>`
      ).join("");
      rects.push(`<text x="${cx.toFixed(1)}" y="${CY}" text-anchor="middle" dominant-baseline="middle" font-family="'IBM Plex Mono', monospace" font-weight="700" font-size="${fontSize}" fill="${p.text}">${tspans}</text>`);

      cursor += direction * p.w;
    }
    const outerEdge = cursor;
    return { rects: rects.join(""), outerEdge };
  }

  const left = stackRects(-1);
  const right = stackRects(1);

  const barLeftEnd = left.outerEdge - SLEEVE_STUB;
  const barRightEnd = right.outerEdge + SLEEVE_STUB;
  const gradId = `barGrad-${uid}`;
  const SHAFT_H = 3;
  const SLEEVE_H = 8;
  const leftCollarX = CENTER - HALF_BAR;
  const rightCollarX = CENTER + HALF_BAR;

  return `
    <svg viewBox="0 0 ${VB_W} ${VB_H}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e4e3df"/>
          <stop offset="45%" stop-color="#aeada4"/>
          <stop offset="100%" stop-color="#87857b"/>
        </linearGradient>
      </defs>
      <rect x="${leftCollarX.toFixed(1)}" y="${(CY - SHAFT_H/2).toFixed(1)}" width="${(rightCollarX - leftCollarX).toFixed(1)}" height="${SHAFT_H}" fill="url(#${gradId})"/>
      <rect x="${barLeftEnd.toFixed(1)}" y="${(CY - SLEEVE_H/2).toFixed(1)}" width="${(leftCollarX - barLeftEnd).toFixed(1)}" height="${SLEEVE_H}" rx="1.5" fill="url(#${gradId})"/>
      <rect x="${rightCollarX.toFixed(1)}" y="${(CY - SLEEVE_H/2).toFixed(1)}" width="${(barRightEnd - rightCollarX).toFixed(1)}" height="${SLEEVE_H}" rx="1.5" fill="url(#${gradId})"/>
      <rect x="${(leftCollarX - 1.5).toFixed(1)}" y="${CY - 8}" width="3" height="16" fill="#8a8880"/>
      <rect x="${(rightCollarX - 1.5).toFixed(1)}" y="${CY - 8}" width="3" height="16" fill="#8a8880"/>
      ${left.rects}
      ${right.rects}
    </svg>
  `;
}

const BAR_KG = 15;

/* Rounds a target total weight to the nearest weight actually loadable
   with the plates in the inventory (nearest 0.5kg per side), then
   returns the plate breakdown for one side. */
function computeLoadable(rawTotalKg){
  const rawSide = Math.max(0, (rawTotalKg - BAR_KG) / 2);
  const side = Math.round(rawSide * 2) / 2; // nearest 0.5kg per side
  let remaining = side;
  const stack = [];
  for(const p of PLATE_DEFS){
    while(remaining + 1e-6 >= p.kg){
      stack.push(p);
      remaining -= p.kg;
    }
  }
  const total = BAR_KG + side * 2;
  return { total, side, stack };
}

function renderHalfBar(rawTotalKg, uid){
  const { total, stack } = computeLoadable(rawTotalKg);
  const VB_H = 90, CY = 45;
  const COLLAR_GAP = 3;
  const SLEEVE_STUB = 10;
  const SHAFT_STUB = 26; // bit of bare shaft shown left of the collar
  const SHAFT_H = 3;
  const SLEEVE_H = 8;

  const collarX = SHAFT_STUB;
  let cursor = collarX + COLLAR_GAP;
  const rects = [];
  for(const p of stack){
    const x = cursor;
    const cx = x + p.w / 2;
    rects.push(`<rect x="${x.toFixed(1)}" y="${(CY - p.h/2).toFixed(1)}" width="${p.w}" height="${p.h}" rx="1.5" fill="${p.color}" stroke="rgba(33,31,27,0.35)" stroke-width="1"/>`);

    const lines = plateLabelLines(p.kg);
    const fontSize = p.w >= 11 ? 8.5 : 7;
    const lineGap = fontSize + 0.5;
    const startDy = lines.length > 1 ? -(lineGap / 2) : 0;
    const tspans = lines.map((line, i) =>
      `<tspan x="${cx.toFixed(1)}" dy="${i === 0 ? startDy.toFixed(1) : lineGap}">${line}</tspan>`
    ).join("");
    rects.push(`<text x="${cx.toFixed(1)}" y="${CY}" text-anchor="middle" dominant-baseline="middle" font-family="'IBM Plex Mono', monospace" font-weight="700" font-size="${fontSize}" fill="${p.text}">${tspans}</text>`);

    cursor += p.w;
  }
  const sleeveEnd = cursor + SLEEVE_STUB;
  const VB_W = sleeveEnd + 6;
  const gradId = `halfBarGrad-${uid}`;

  const svg = `
    <svg viewBox="0 0 ${VB_W.toFixed(1)} ${VB_H}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e4e3df"/>
          <stop offset="45%" stop-color="#aeada4"/>
          <stop offset="100%" stop-color="#87857b"/>
        </linearGradient>
      </defs>
      <rect x="0" y="${(CY - SHAFT_H/2).toFixed(1)}" width="${collarX}" height="${SHAFT_H}" fill="url(#${gradId})"/>
      <rect x="${collarX.toFixed(1)}" y="${(CY - SLEEVE_H/2).toFixed(1)}" width="${(sleeveEnd - collarX).toFixed(1)}" height="${SLEEVE_H}" rx="1.5" fill="url(#${gradId})"/>
      <rect x="${(collarX - 1.5).toFixed(1)}" y="${CY - 8}" width="3" height="16" fill="#8a8880"/>
      ${rects.join("")}
    </svg>
  `;
  return { svg, total };
}

/* ---------- render ---------- */
const PCT_STEPS = [100,95,90,85,80,75,70,65,60,55,50,45,40];
const COLLAPSE_KEY = "pr-tracker:chris:collapsed";
function loadCollapsedSet(){
  try{
    const raw = localStorage.getItem(COLLAPSE_KEY);
    if(raw) return new Set(JSON.parse(raw));
  }catch(e){ /* ignore */ }
  return new Set();
}
function saveCollapsedSet(set){
  try{
    localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...set]));
  }catch(e){ /* ignore */ }
}
let collapsedGroups = loadCollapsedSet();

function render(){
  const container = document.getElementById("groups");
  container.innerHTML = "";

  for(const group of GROUPS){
    const isCollapsed = collapsedGroups.has(group.label);
    const groupEl = document.createElement("div");
    groupEl.className = "group" + (isCollapsed ? " collapsed" : "");
    groupEl.innerHTML = `
      <button type="button" class="group-label" data-group="${group.label}">
        ${group.label}
        <svg class="group-chevron" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="group-body"></div>
    `;
    const bodyEl = groupEl.querySelector(".group-body");

    for(const liftName of group.lifts){
      const current = getCurrent(liftName);
      const card = document.createElement("div");
      card.className = "card";

      const maxHtml = current
        ? `<div class="max-num">${current.value}<span>kg</span></div>
           <div class="lift-meta"><span class="tag">${current.entry.rep}</span><span>${formatDate(current.entry.date)}</span></div>`
        : `<div class="max-empty">No entries yet</div>`;

      const safeId = liftName.replace(/[^a-z0-9]/gi,'');
      const pctRowsHtml = current ? PCT_STEPS.map(pct => {
        const rawTarget = current.value * pct / 100;
        const { total } = computeLoadable(rawTarget);
        const displayWeight = pct === 100 ? current.value : total;
        return `
          <div class="pct-row ${pct === 100 ? 'is-max' : ''}" data-pct="${pct}" data-lift="${liftName}">
            <span class="pct-label">${pct}%</span>
            <span class="pct-weight">${displayWeight} kg</span>
          </div>
          <div class="pct-bar-wrap" data-pct-bar="${liftName}-${pct}"></div>
        `;
      }).join("") : "";

      card.innerHTML = `
        <div class="card-top">
          <div>
            <p class="lift-name">${liftName}</p>
          </div>
          <div class="max-block">${maxHtml}</div>
        </div>
        ${current ? `<div class="bar-row">${renderBar(current.value, safeId)}</div>` : ""}
        <div class="card-actions">
          <button class="btn btn-add" data-lift="${liftName}" data-action="add">+ New PR</button>
          <button class="btn btn-hist" data-lift="${liftName}" data-action="hist">History</button>
          ${current ? `<button class="btn btn-pct" data-lift="${liftName}" data-action="pct">%</button>` : ""}
        </div>
        <div class="history" data-hist-for="${liftName}">
          ${sortedHistory(liftName).map(e => `
            <div class="hist-row">
              <div class="hist-left">
                <div class="hist-date">${formatDate(e.date)}</div>
                <div class="hist-rep">${e.rep}</div>
                ${e.note ? `<div class="hist-note">${e.note}</div>` : ""}
              </div>
              <div class="hist-right">
                <div class="hist-weight">${e.weight} kg</div>
                <div class="hist-actions">
                  <button type="button" class="hist-action edit" data-lift="${liftName}" data-id="${e.id}">Edit</button>
                  <button type="button" class="hist-action delete" data-lift="${liftName}" data-id="${e.id}">Delete</button>
                </div>
              </div>
            </div>
          `).join("") || `<p style="color:var(--ink-faint);font-size:13px;">No history yet.</p>`}
        </div>
        ${current ? `<div class="pct-panel" data-pct-for="${liftName}">${pctRowsHtml}</div>` : ""}
      `;
      bodyEl.appendChild(card);
    }
    container.appendChild(groupEl);
  }

  // wire up buttons
  container.querySelectorAll('[data-action="add"]').forEach(btn=>{
    btn.addEventListener("click", () => openModal(btn.dataset.lift));
  });
  container.querySelectorAll('[data-action="hist"]').forEach(btn=>{
    btn.addEventListener("click", () => {
      const el = container.querySelector(`.history[data-hist-for="${CSS.escape(btn.dataset.lift)}"]`);
      el.classList.toggle("open");
    });
  });
  container.querySelectorAll('[data-action="pct"]').forEach(btn=>{
    btn.addEventListener("click", () => {
      const el = container.querySelector(`.pct-panel[data-pct-for="${CSS.escape(btn.dataset.lift)}"]`);
      el.classList.toggle("open");
    });
  });
  container.querySelectorAll('.pct-row').forEach(row=>{
    row.addEventListener("click", () => {
      const lift = row.dataset.lift;
      const pct = row.dataset.pct;
      const wrap = container.querySelector(`.pct-bar-wrap[data-pct-bar="${CSS.escape(lift + '-' + pct)}"]`);
      if(!wrap) return;
      const isOpen = wrap.classList.contains("open");
      if(isOpen){
        wrap.classList.remove("open");
        wrap.innerHTML = "";
        return;
      }
      const current = getCurrent(lift);
      if(!current) return;
      const rawTarget = current.value * Number(pct) / 100;
      const safeId = (lift + pct).replace(/[^a-z0-9]/gi,'');
      const { svg, total } = renderHalfBar(rawTarget, safeId);
      wrap.innerHTML = `<p class="pct-bar-label">${total}<span style="font-family:var(--mono);font-size:13px;color:var(--ink-dim);margin-left:4px;">kg</span></p>${svg}`;
      wrap.classList.add("open");
    });
  });
  container.querySelectorAll('.hist-action.edit').forEach(btn=>{
    btn.addEventListener("click", () => {
      openEditModal(btn.dataset.lift, btn.dataset.id);
    });
  });
  container.querySelectorAll('.hist-action.delete').forEach(btn=>{
    btn.addEventListener("click", async () => {
      const lift = btn.dataset.lift;
      const id = btn.dataset.id;
      const entry = (DATA[lift] || []).find(e => e.id === id);
      const label = entry ? `${entry.weight}kg (${entry.rep}) on ${formatDate(entry.date)}` : "this entry";
      const proceed = window.confirm(`Delete ${label}? This can't be undone.`);
      if(!proceed) return;
      DATA[lift] = (DATA[lift] || []).filter(e => e.id !== id);
      await persist();
      render();
      showToast("Entry deleted");
    });
  });
  container.querySelectorAll('.group-label').forEach(btn=>{
    btn.addEventListener("click", () => {
      const label = btn.dataset.group;
      if(collapsedGroups.has(label)) collapsedGroups.delete(label);
      else collapsedGroups.add(label);
      saveCollapsedSet(collapsedGroups);
      btn.closest(".group").classList.toggle("collapsed");
    });
  });
}

/* ---------- modal ---------- */
const backdrop = document.getElementById("modalBackdrop");
const liftSelect = document.getElementById("liftSelect");
const weightInput = document.getElementById("weightInput");
const repInput = document.getElementById("repInput");
const dateInput = document.getElementById("dateInput");
const noteInput = document.getElementById("noteInput");
const repPresets = document.getElementById("repPresets");

function populateLiftSelect(){
  liftSelect.innerHTML = "";
  for(const group of GROUPS){
    const og = document.createElement("optgroup");
    og.label = group.label;
    for(const liftName of group.lifts){
      const opt = document.createElement("option");
      opt.value = liftName;
      opt.textContent = liftName;
      og.appendChild(opt);
    }
    liftSelect.appendChild(og);
  }
}

function todayISO(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

let editingEntry = null; // { lift, id } when editing, null when adding new

function openModal(liftName){
  editingEntry = null;
  document.getElementById("modalTitle").textContent = "New PR";
  document.getElementById("saveBtn").textContent = "Save PR";
  populateLiftSelect();
  if(liftName) liftSelect.value = liftName;
  weightInput.value = "";
  repInput.value = "1RM";
  setActiveChip("1RM");
  dateInput.value = todayISO();
  noteInput.value = "";
  backdrop.classList.add("open");
  setTimeout(() => weightInput.focus(), 50);
}

function openEditModal(liftName, id){
  const entry = (DATA[liftName] || []).find(e => e.id === id);
  if(!entry) return;
  editingEntry = { lift: liftName, id };
  document.getElementById("modalTitle").textContent = "Edit PR";
  document.getElementById("saveBtn").textContent = "Save Changes";
  populateLiftSelect();
  liftSelect.value = liftName;
  weightInput.value = entry.weight;
  repInput.value = entry.rep;
  setActiveChip(entry.rep);
  dateInput.value = entry.date;
  noteInput.value = entry.note || "";
  backdrop.classList.add("open");
  setTimeout(() => weightInput.focus(), 50);
}

function closeModal(){
  backdrop.classList.remove("open");
  editingEntry = null;
}

function setActiveChip(val){
  repPresets.querySelectorAll(".rep-chip").forEach(c=>{
    c.classList.toggle("active", c.dataset.val === val || (val !== "1RM" && val !== "3RM" && val !== "5RM" && c.dataset.val === "custom"));
  });
}

repPresets.addEventListener("click", (e) => {
  const chip = e.target.closest(".rep-chip");
  if(!chip) return;
  if(chip.dataset.val === "custom"){
    repInput.value = "";
    repInput.focus();
    setActiveChip("custom");
  } else {
    repInput.value = chip.dataset.val;
    setActiveChip(chip.dataset.val);
  }
});

document.getElementById("fabAdd").addEventListener("click", () => openModal());
document.getElementById("cancelBtn").addEventListener("click", closeModal);
backdrop.addEventListener("click", (e) => { if(e.target === backdrop) closeModal(); });

document.getElementById("prForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const lift = liftSelect.value;
  const weight = weightInput.value.trim();
  const rep = repInput.value.trim() || "1RM";
  const date = dateInput.value || todayISO();
  const note = noteInput.value.trim();

  if(!weight){ weightInput.focus(); return; }

  if(editingEntry){
    const { lift: oldLift, id } = editingEntry;
    const idx = (DATA[oldLift] || []).findIndex(en => en.id === id);
    if(idx === -1){ showToast("Couldn't find that entry"); closeModal(); return; }
    const updated = { id, date, rep, weight, note };
    if(lift === oldLift){
      DATA[oldLift][idx] = updated;
    } else {
      DATA[oldLift].splice(idx, 1);
      if(!DATA[lift]) DATA[lift] = [];
      DATA[lift].push(updated);
    }
    await persist();
    render();
    closeModal();
    showToast(`Updated ${weight}kg — ${lift}`);
    return;
  }

  if(!DATA[lift]) DATA[lift] = [];
  DATA[lift].push({ id: makeEntryId(), date, rep, weight, note });
  await persist();
  render();
  closeModal();
  showToast(`Logged ${weight}kg — ${lift}`);
});

/* ---------- toast ---------- */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* ---------- backup: export / import ---------- */
document.getElementById("exportBtn").addEventListener("click", async () => {
  const timestamp = new Date().toISOString();

  // Try to record the timestamp first, but don't let this block the
  // actual download below — the file is the important part.
  META.lastBackup = timestamp;
  const metaSaved = await persist();
  if(metaSaved) renderBackupStatus();

  try{
    const payload = { exportedAt: timestamp, lifts: DATA };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const stamp = timestamp.slice(0, 10);
    const a = document.createElement("a");
    a.href = url;
    a.download = `mels-pr-tracker-backup-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    showToast(metaSaved ? "Backup downloaded" : "Backup downloaded — couldn't save the timestamp, try again");
  }catch(e){
    console.error(e);
    showToast("Export failed — try again");
  }
});

document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("importFile").click();
});

document.getElementById("importFile").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    const lifts = (parsed && typeof parsed === "object" && parsed.lifts) ? parsed.lifts : parsed;
    if(!lifts || typeof lifts !== "object" || Array.isArray(lifts)){
      throw new Error("Unrecognized file format");
    }
    const proceed = window.confirm("Importing will replace the PR data currently on this device. Continue?");
    if(!proceed){ e.target.value = ""; return; }
    DATA = lifts;
    ensureEntryIds(DATA);
    await persist();
    render();
    showToast("Data imported");
  }catch(err){
    console.error(err);
    showToast("Couldn't read that backup file");
  }
  e.target.value = "";
});

document.getElementById("driveSaveBtn").addEventListener("click", saveToDrive);
document.getElementById("driveLoadBtn").addEventListener("click", loadFromDrive);

/* ---------- init ---------- */
(async function init(){
  await loadData();
  render();
  renderBackupStatus();
  renderDriveStatus();
})();

</script>
</body>
</html>
